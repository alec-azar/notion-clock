
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500&display=swap');
  .clock-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 2rem 1rem; gap: 0.5rem; }
  .tz-label { font-family: 'Rajdhani', sans-serif; font-weight: 300; font-size: 13px; letter-spacing: 0.25em; color: var(--color-text-secondary); text-transform: uppercase; }
  .time-display { font-family: 'Share Tech Mono', monospace; font-size: clamp(48px, 10vw, 80px); color: var(--color-text-primary); letter-spacing: 0.05em; line-height: 1; }
  .date-display { font-family: 'Rajdhani', sans-serif; font-weight: 500; font-size: 15px; letter-spacing: 0.15em; color: var(--color-text-secondary); }
  .separator { width: 40px; height: 1px; background: var(--color-border-tertiary); margin: 0.25rem 0; }
  .offset-note { font-family: 'Rajdhani', sans-serif; font-size: 12px; color: var(--color-text-tertiary); letter-spacing: 0.1em; }
</style>
<div class="clock-wrap">
  <div class="tz-label">Australian Eastern Standard Time &nbsp;·&nbsp; AEST</div>
  <div class="separator"></div>
  <div class="time-display" id="clock">--:--:--</div>
  <div class="date-display" id="dateline">--- --, ----</div>
  <div class="separator"></div>
  <div class="offset-note" id="offset-note">UTC+10 &nbsp;(AEST) &nbsp;/&nbsp; UTC+11 during AEDT</div>
</div>
<script>
function updateClock() {
  const now = new Date();
  const options = { timeZone: 'Australia/Sydney', hour12: false, hour:'2-digit', minute:'2-digit', second:'2-digit' };
  const dateOptions = { timeZone: 'Australia/Sydney', weekday:'short', month:'short', day:'numeric', year:'numeric' };
  const timeStr = now.toLocaleTimeString('en-AU', options);
  const dateStr = now.toLocaleDateString('en-AU', dateOptions);
  document.getElementById('clock').textContent = timeStr;
  document.getElementById('dateline').textContent = dateStr;
  const offset = -now.toLocaleString('en-AU', {timeZone:'Australia/Sydney', timeZoneName:'short'}).split(' ').pop();
  const tzAbbr = now.toLocaleString('en-AU', {timeZone:'Australia/Sydney', timeZoneName:'short'}).split(' ').pop();
  document.getElementById('offset-note').textContent = tzAbbr + ' · ' + (tzAbbr === 'AEDT' ? 'UTC+11 (Daylight Saving active)' : 'UTC+10 (Standard Time)');
}
updateClock();
setInterval(updateClock, 1000);
</script>
